openapi: 3.0.3
info:
  title: GazFlow API
  version: 0.2.0
  description: Stub OpenAPI — routes principales post-MVP. Génération complète via utoipa prévue.
paths:
  /api/network:
    get:
      summary: Réseau actif (nœuds, pipes, gaz)
  /api/networks:
    get:
      summary: Liste des réseaux disponibles et réseau actif
      description: |
        Réponse JSON :
        - `active` (string) : id du dataset actif
        - `networks` (array) : métadonnées par réseau
          - `id` (string)
          - `tier` (string) : `demo` | `standard` | `large` | `x_large`
          - `node_count` (integer)
          - `recommended_demo` (boolean)
  /api/network/gas-composition:
    patch:
      summary: Met à jour la composition gaz
  /api/import:
    post:
      summary: Import réseau (GeoJSON, CSV, Shapefile)
  /api/simulate:
    post:
      summary: Simulation steady-state
  /api/simulate/timeseries:
    post:
      summary: Série temporelle 24h
  /api/simulate/transient:
    post:
      summary: Transitoire (mode quasi_steady ou pde)
      description: |
        Chaque pas (`TransientStepResult`) inclut :
        - `flows` : débit aval par conduite (affichage carte / Cesium)
        - `flows_in` : débit amont [Nm³/s] (PDE : flows[0] ; quasi-steady : = flows)
        - `flows_out` : débit aval [Nm³/s] (PDE : flows[n] ; quasi-steady : = flows)
  /api/simulate/compare:
    post:
      summary: Compare deux scénarios topologiques (ΔP, ΔQ)
  /api/scenarios:
    get:
      summary: Liste scénarios du dataset actif
    post:
      summary: Crée un scénario (diff vs baseline)
  /api/scenarios/{id}/apply:
    post:
      summary: Applique un scénario → réseau modifié
  /api/contingency:
    post:
      summary: Analyse N-1
  /api/contingency/export:
    post:
      summary: Export rapport N-1
  /api/calibrate:
    post:
      summary: Calage SCADA
  /api/exports:
    get:
      summary: Historique des exports
  /api/exports/{id}/download:
    get:
      summary: Télécharge un export archivé
  /api/ws/sim:
    get:
      summary: WebSocket simulation steady / timeseries / contingency
      description: |
        Messages client (tag `type`, snake_case) :
        - `start_simulation` : `options.robust_mode` (bool), `options.continuation_scales` (number[])
        - `start_timeseries_simulation` : `options.robust_mode` (bool)
        - `start_contingency_simulation`, `cancel_simulation`

        Messages serveur :
        - `started`, `iteration`, `snapshot`, `converged`, `cancelled`, `error`, …
        - `continuation_step` : `{ run_id, seq, step, total_steps, scale }` — palier de continuation de charge
